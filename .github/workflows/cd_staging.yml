# Build the docker image
# Push the docker image to the docker hub
# SSH into the Staging server and start the new image

name: Deploy to Staging
on:
  push:
    branches:
      - "main"

# added ""secrets wali thing

# ********** This is very very important thing ********** 
# export NVM_DIR="$HOME/.nvm"
#             source $NVM_DIR/nvm.sh
#             nvm use 20
# https://github.com/appleboy/ssh-action used to ssh into ec2.
jobs:
  builds:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the code (clone codebase to ubuntu m/c)
        uses: actions/checkout@v3
      
      - name: Docker Login
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}
      
      - name: Build and Push Docker Image for (WEB)
        uses: docker/build-push-action@v4
        with:
          contexts: .
          file: ./dockerfiles-prod/jns-web.Dockerfile
          push: true
          build-args: |
            DATABASE_URL=${{ secrets.STAGING_DATABASE_URL }}
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/jns-web:${{ github.sha }}

      - name: Build and Push Docker Image for (HTTP-SERVER)
        uses: docker/build-push-action@v4
        with:
          contexts: .
          file: ./dockerfiles-prod/jns-http.Dockerfile
          push: true
          build-args: |
            DATABASE_URL=${{ secrets.STAGING_DATABASE_URL }}
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/jns-http:${{ github.sha }}

      - name: Build and Push Docker Image for (WS-SERVER)
        uses: docker/build-push-action@v4
        with:
          contexts: .
          file: ./dockerfiles-prod/jns-ws.Dockerfile
          push: true
          build-args: |
            DATABASE_URL=${{ secrets.STAGING_DATABASE_URL }}
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/jns-ws:${{ github.sha }}

      - name: SSH into server (Deploying Everything to the staging cluster)
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.STAGING_IP }}
          username: ubuntu
          key: ${{ secrets.STAGING_SSH_KEY }}
          port: ${{ secrets.STAGING_SSH_PORT }}
          script: |
            sudo docker image prune -a -f
            sudo docker pull ${{ secrets.DOCKERHUB_USERNAME }}/jns-web:${{ github.sha }}
            sudo docker pull ${{ secrets.DOCKERHUB_USERNAME }}/jns-http:${{ github.sha }}
            sudo docker pull ${{ secrets.DOCKERHUB_USERNAME }}/jns-ws:${{ github.sha }}
            sudo docker stop jns-web || true
            sudo docker rm jns-web || true
            sudo docker stop jns-http || true
            sudo docker rm jns-http || true
            sudo docker stop jns-ws || true
            sudo docker rm jns-ws || true
            sudo docker run -d --name jns-http -p 3002:3002 -e DATABASE_URL=${{ secrets.STAGING_DATABASE_URL }} ${{ secrets.DOCKERHUB_USERNAME }}/jns-http:${{ github.sha }}
            sudo docker run -d --name jns-ws -p 3001:3001 -e DATABASE_URL=${{ secrets.STAGING_DATABASE_URL }} ${{ secrets.DOCKERHUB_USERNAME }}/jns-ws:${{ github.sha }}
            sudo docker run -d --name jns-web -p 3000:3000 -e DATABASE_URL=${{ secrets.STAGING_DATABASE_URL }} ${{ secrets.DOCKERHUB_USERNAME }}/jns-web:${{ github.sha }}


